<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sunny AI</title>
    <style>
        :root { --bg: #131314; --side: #1e1f20; --txt: #e3e3e3; --blue: #ffcc00; --acc: #333; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); display: flex; height: 100vh; overflow: hidden; }
        
        /* Ekrany Logowania / Rejestracji */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: var(--side); padding: 40px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #131314; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--blue); color: black; }

        /* Sidebar */
        #sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--acc); display: flex; flex-direction: column; padding: 15px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--blue); margin-bottom: 25px; cursor: pointer; }
        #history-list { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .hist-item { padding: 10px; font-size: 14px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; background: rgba(255,255,255,0.05); }
        .hist-item:hover { background: rgba(255,255,255,0.1); }

        /* Main Chat */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px; }
        .msg-container { width: 100%; max-width: 800px; margin: 0 auto; margin-bottom: 30px; }
        .user-label { color: var(--blue); font-weight: bold; margin-bottom: 5px; font-size: 12px; text-transform: uppercase; }
        .ai-text { background: #222; padding: 15px; border-radius: 12px; line-height: 1.6; }

        .input-box { padding: 20px; background: var(--bg); border-top: 1px solid var(--acc); }
        .input-wrap { max-width: 800px; margin: 0 auto; display: flex; background: var(--side); border-radius: 30px; padding: 5px 15px; border: 1px solid #444; }
        #user-prompt { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; }

        /* Modal Ustawień */
        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        .modal { background: var(--side); padding: 30px; border-radius: 15px; width: 400px; }
    </style>
</head>
<body>

<!-- Ekran Auth -->
<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color: var(--blue);">Sunny AI</h2>
        <input type="text" id="u-name" placeholder="Użytkownik">
        <input type="password" id="u-pass" placeholder="Hasło">
        <button class="btn btn-primary" onclick="handleAuth('login')">Zaloguj się</button>
        <button class="btn" style="background:#333; color:white;" onclick="handleAuth('register')">Zarejestruj się</button>
    </div>
</div>

<div id="sidebar">
    <div class="logo" onclick="location.reload()">Sunny AI</div>
    <button class="btn btn-primary" style="margin-bottom: 20px;" onclick="newChat()">+ Nowy czat</button>
    <div id="history-list"></div>
    <button class="btn" style="background:#333; color:white;" onclick="openSettings()">⚙️ Ustawienia</button>
    <button class="btn" style="background:#552222; color:white; margin-top:5px;" onclick="logout()">Wyloguj</button>
</div>

<div id="main">
    <div id="chat-window">
        <div id="chat-content">
            <h1 style="text-align: center; margin-top: 150px; opacity: 0.2;">W czym mogę pomóc?</h1>
        </div>
    </div>
    <div class="input-box">
        <div class="input-wrap">
            <input type="text" id="user-prompt" placeholder="Napisz do Sunny AI..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-primary" style="width:40px; border-radius:50%;" onclick="send()">➤</button>
        </div>
    </div>
</div>

<!-- Modal Ustawień -->
<div id="settings-modal">
    <div class="modal">
        <h3>Ustawienia serwera</h3>
        <p>Wybierz aktywny serwer Groq:</p>
        <select id="server-choice" style="width:100%; padding:10px; background:#111; color:white; border:1px solid #444;">
            <option value="Serwer 1">Serwer 1</option>
            <option value="Serwer 2">Serwer 2</option>
            <option value="Serwer 3">Serwer 3</option>
            <option value="Serwer 4">Serwer 4</option>
            <option value="Serwer 5">Serwer 5</option>
        </select>
        <button class="btn btn-primary" style="margin-top:20px;" onclick="closeSettings()">Zapisz</button>
    </div>
</div>

<script>
    let USER = JSON.parse(localStorage.getItem('sunny_user'));
    let SELECTED_SERVER = localStorage.getItem('sunny_server') || "Serwer 1";

    if (USER) {
        document.getElementById('auth-overlay').style.display = 'none';
        loadHistory();
    }

    async function handleAuth(type) {
        const username = document.getElementById('u-name').value;
        const password = document.getElementById('u-pass').value;
        const res = await fetch('/' + type, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (data.user_id) {
            localStorage.setItem('sunny_user', JSON.stringify(data));
            location.reload();
        } else { alert(data.detail); }
    }

    function logout() { localStorage.clear(); location.reload(); }
    function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
    function closeSettings() {
        SELECTED_SERVER = document.getElementById('server-choice').value;
        localStorage.setItem('sunny_server', SELECTED_SERVER);
        document.getElementById('settings-modal').style.display = 'none';
    }
    function newChat() { document.getElementById('chat-content').innerHTML = ''; }

    async function send() {
        const promptInput = document.getElementById('user-prompt');
        const prompt = promptInput.value;
        if (!prompt) return;

        promptInput.value = ''; // Od razu czyścimy, żeby zapobiec podwójnemu wysłaniu
        const content = document.getElementById('chat-content');
        
        // Renderuj pytanie
        const qId = Date.now();
        content.innerHTML += `<div class="msg-container" id="q-${qId}"><div class="user-label">TY (${SELECTED_SERVER}):</div><div>${prompt}</div></div>`;
        
        const res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                serverName: SELECTED_SERVER,
                prompt: prompt,
                user_id: USER.user_id
            })
        });

        const data = await res.json();
        if (res.ok) {
            content.innerHTML += `<div class="msg-container"><div class="user-label">SUNNY AI:</div><div class="ai-text">${data.response.replace(/\n/g, '<br>')}</div></div>`;
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            loadHistory();
        } else {
            alert(data.response);
        }
    }

    async function loadHistory() {
        const res = await fetch('/history/' + USER.user_id);
        const data = await res.json();
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        data.reverse().forEach(h => {
            const div = document.createElement('div');
            div.className = 'hist-item';
            div.innerText = h.prompt.substring(0, 30) + "...";
            div.onclick = () => {
                document.getElementById('chat-content').innerHTML = `
                    <div class="msg-container"><div class="user-label">Pytanie:</div><div>${h.prompt}</div></div>
                    <div class="msg-container"><div class="user-label">Odpowiedź:</div><div class="ai-text">${h.response.replace(/\n/g, '<br>')}</div></div>
                `;
            };
            list.appendChild(div);
        });
    }
</script>
</body>
</html>
